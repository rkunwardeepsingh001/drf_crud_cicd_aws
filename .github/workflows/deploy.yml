name: DRF CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker Image
        run: docker build -t drf-app:latest .

      - name: Run Django Checks
        run: docker compose run --rm web python manage.py check

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      APP_DIR: ${{ secrets.EC2_PROJECT_PATH || '/home/ubuntu/drf_crud-django_rivision' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "Dockerfile,docker-compose.yml,requirements.txt,manage.py,django_revision,app_one"
          target: ${{ env.APP_DIR }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_DIR
          script: |
            set -e

            cd "$APP_DIR"
            sudo docker compose up -d --build
            sudo docker compose exec -T web python manage.py migrate
            sudo docker compose ps
